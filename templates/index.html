<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nykaa BI | Architect Pro</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
        }

        .sidebar-dark {
            background-color: #0f172a;
        }

        .chat-bubble-user {
            background: #1e293b;
            color: white;
            border-radius: 12px 12px 0 12px;
        }

        .chat-bubble-ai {
            background: #f8fafc;
            color: #334155;
            border: 1px solid #e2e8f0;
            border-radius: 12px 12px 12px 0;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <aside class="w-80 sidebar-dark text-slate-400 flex flex-col shadow-2xl z-20">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-white text-xl font-bold flex items-center gap-2">📊 Nykaa BI</h1>
            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Conversational Architect</p>
        </div>

        <div id="chatThread" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
            <p class="text-[10px] font-bold text-slate-600 uppercase text-center">Session Start</p>
        </div>

        <div class="p-4 bg-slate-900/50 space-y-3">
            <button onclick="document.getElementById('fileInput').click()"
                class="w-full py-2 bg-blue-600/20 text-blue-400 border border-blue-500/30 rounded text-xs font-bold hover:bg-blue-600 hover:text-white transition">📁
                UPLOAD NEW DATA</button>
            <input type="file" id="fileInput" class="hidden" accept=".csv" onchange="handleUpload(this)">
            <button onclick="resetWholeSystem()"
                class="w-full py-2 border border-slate-700 rounded text-xs hover:text-red-400 transition">RESET
                SESSION</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-16 glass px-8 flex items-center justify-between shadow-sm z-10">
            <span id="systemStatus" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Awaiting
                Input...</span>
            <div class="flex items-center gap-2 text-[10px] text-green-500 font-bold"><span
                    class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> AGENT ACTIVE</div>
        </header>

        <div id="output" class="flex-1 overflow-y-auto p-8 space-y-8 pb-32 custom-scrollbar">
            <div id="welcome" class="text-center py-20">
                <h2 class="text-2xl font-bold text-slate-800 mb-2">How can I help you today?</h2>
                <p class="text-slate-500 text-sm">Upload your marketing CSV to generate real-time insights.</p>
            </div>

            <div id="analysisBox" class="hidden glass p-6 rounded-2xl shadow-sm border-l-4 border-blue-600">
                <h3 class="text-[10px] font-bold text-blue-600 uppercase mb-2 tracking-tighter">Current Insight</h3>
                <p id="analysisText" class="text-slate-700 font-medium leading-relaxed"></p>
            </div>

            <div id="visuals" class="hidden grid grid-cols-1 xl:grid-cols-2 gap-8">
                <div class="glass p-4 rounded-2xl h-[400px] shadow-sm" id="chart"></div>
                <div class="glass p-4 rounded-2xl h-[400px] overflow-auto shadow-sm bg-white/50">
                    <table id="table" class="w-full text-[11px] text-left border-collapse"></table>
                </div>
            </div>

            <div id="sqlBox"
                class="hidden glass p-4 rounded-xl font-mono text-[10px] text-slate-500 bg-white/50 border-dashed">
            </div>
        </div>

        <div class="absolute bottom-0 w-full p-8 pointer-events-none">
            <div
                class="max-w-4xl mx-auto glass shadow-2xl rounded-2xl p-2 flex gap-2 pointer-events-auto ring-8 ring-slate-900/5">
                <input type="text" id="queryInput"
                    placeholder="Ask a follow-up (e.g., 'Now show me ROI for YouTube')..."
                    class="flex-1 bg-transparent px-5 outline-none text-slate-700 font-medium">
                <button id="analyzeBtn" onclick="submitQuery()"
                    class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">ANALYZE</button>
            </div>
        </div>
    </main>

    <script>
        let chatHistory = [];

        // Enter key listener
        document.getElementById('queryInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') submitQuery(); });

        function resetWholeSystem() { location.reload(); }

        // Function to add bubbles to the sidebar
        function appendToChatThread(role, text) {
            const thread = document.getElementById('chatThread');
            const bubble = document.createElement('div');
            bubble.className = role === 'user' ? 'chat-bubble-user p-3 text-xs ml-auto max-w-[80%]' : 'chat-bubble-ai p-3 text-xs mr-auto max-w-[80%]';
            bubble.innerText = text;
            thread.appendChild(bubble);
            thread.scrollTop = thread.scrollHeight;
        }

        async function handleUpload(input) {
            if (!input.files[0]) return;
            document.getElementById('systemStatus').innerText = "Cleaning data...";
            const fd = new FormData(); fd.append('file', input.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) {
                document.getElementById('systemStatus').innerText = "Database ready!";
                appendToChatThread('ai', "I've successfully cleaned and loaded your data. What would you like to analyze?");
            }
        }

        async function submitQuery() {
            const input = document.getElementById('queryInput');
            const btn = document.getElementById('analyzeBtn');
            const query = input.value;
            if (!query) return;

            // Add user query to sidebar immediately
            appendToChatThread('user', query);

            btn.disabled = true;
            document.getElementById('systemStatus').innerText = "Architect is thinking...";

            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, history: chatHistory })
                });
                const data = await res.json();

                if (data.error) {
                    document.getElementById('visuals').classList.add('hidden');
                    document.getElementById('analysisBox').classList.remove('hidden');
                    document.getElementById('analysisText').innerHTML = `<span class="text-red-500 font-bold">Error:</span> ${data.analysis}`;
                    appendToChatThread('ai', "I couldn't process that. " + data.analysis);
                    return;
                }

                // UI Success state
                document.getElementById('welcome').classList.add('hidden');
                document.getElementById('analysisBox').classList.remove('hidden');
                document.getElementById('visuals').classList.remove('hidden');
                document.getElementById('sqlBox').classList.remove('hidden');

                document.getElementById('analysisText').innerText = data.analysis;
                document.getElementById('sqlBox').innerText = `SQL: ${data.sql}`;

                // Add AI response to sidebar
                appendToChatThread('ai', data.analysis);

                if (data.chart) Plotly.newPlot('chart', JSON.parse(data.chart).data, JSON.parse(data.chart).layout, { responsive: true });

                const cols = Object.keys(data.data[0]);
                let h = `<thead class="bg-slate-100 sticky top-0 font-bold text-slate-600 uppercase"><tr>${cols.map(c => `<th class="p-3 border-b">${c}</th>`).join('')}</tr></thead>`;
                h += `<tbody>${data.data.slice(0, 10).map(r => `<tr class="hover:bg-blue-50/50 border-b border-slate-100">${cols.map(c => `<td class="p-3 text-slate-500">${r[c]}</td>`).join('')}</tr>`).join('')}</tbody>`;
                document.getElementById('table').innerHTML = h;

                // Sync history with LLM format
                chatHistory.push({ role: "user", parts: [{ text: query }] });
                chatHistory.push({ role: "model", parts: [{ text: data.analysis }] });

            } finally {
                btn.disabled = false;
                document.getElementById('systemStatus').innerText = "Engine Ready";
                input.value = '';
            }
        }
    </script>
</body>

</html>
